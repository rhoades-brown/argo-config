{{- if .Values.ingress.tailscale.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-tailscale
  labels:
    app.kubernetes.io/name: open-notebook
    {{- include "open-notebook.labels" . | nindent 4 }}
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  name: ui
  tls:
    - hosts:
        - {{ .Values.ingress.tailscale.hostname }}
{{- end }}
