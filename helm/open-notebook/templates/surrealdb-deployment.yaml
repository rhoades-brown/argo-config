apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-surrealdb
  labels:
    app.kubernetes.io/name: surrealdb
    {{- include "open-notebook.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: surrealdb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: surrealdb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: surrealdb
          image: "{{ .Values.surrealdb.image.repository }}:{{ .Values.surrealdb.image.tag }}"
          imagePullPolicy: Always
          args:
            - start
            - --bind
            - 0.0.0.0:8000
            - rocksdb:/mydata/mydatabase.db
          env:
            - name: SURREAL_USER
              value: {{ .Values.surrealdb.database.user | quote }}
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: surrealPassword
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /mydata
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-surrealdb
