apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-surrealdb
  labels:
    app.kubernetes.io/name: surrealdb
    {{- include "open-notebook.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: surrealdb
    app.kubernetes.io/instance: {{ .Release.Name }}
