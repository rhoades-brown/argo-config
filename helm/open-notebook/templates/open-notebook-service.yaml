apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: open-notebook
    {{- include "open-notebook.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8502
      targetPort: ui
      protocol: TCP
      name: ui
    - port: 5055
      targetPort: api
      protocol: TCP
      name: api
  selector:
    app.kubernetes.io/name: open-notebook
    app.kubernetes.io/instance: {{ .Release.Name }}
