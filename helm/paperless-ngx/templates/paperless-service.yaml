apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-paperless
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/instance: {{ .Release.Name }}

