# -- Application identity
name: ""
namespace: ""

# -- Git repository for ArgoCD source
gitRepo: https://github.com/rhoades-brown/argo-config.git
targetRevision: main

# -- Upstream Helm chart source
chart:
  repoURL: ""
  name: ""
  version: ""

# -- Path to the values file in the git repo
valuesFile: ""

# -- Optional path to a local helm chart in the git repo (instead of upstream chart)
helmPath: ""

# -- Optional inline values object for helm charts (used with helmPath)
valuesObject: {}

# -- Optional external git source (for non-helm, non-local repos e.g. raw CRDs)
gitSource:
  repoURL: ""
  path: ""
  targetRevision: ""

# -- Optional path to raw manifests directory in the git repo
manifestsPath: ""

# -- Optional managed namespace metadata for syncPolicy
managedNamespaceMetadata: {}

# -- Optional extra syncOptions beyond CreateNamespace=true
extraSyncOptions: []

# -- Kargo delivery pipeline
kargo:
  enabled: false
  project: ""
  autoPromotionEnabled: true
  warehouse:
    images: []
    #  - repoURL: docker.io/ollama/ollama
    #    tagSelectionStrategy: SemVer
    #    allowTags: ""
    chart:
      repoURL: ""
      name: ""
      semverConstraint: ""
    gitSource:
      repoURL: ""
      semverConstraint: ""
  stage:
    imageUpdates: []
    #  - key: ollama.image.tag
    #    image: docker.io/ollama/ollama
    #    file: valuesfiles/open-webui.yaml
