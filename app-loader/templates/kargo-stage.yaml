{{- if .Values.kargo.enabled }}
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: {{ include "app-loader.kargoProject" . }}
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: {{ .Values.name }}
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: {{ .Values.gitRepo }}
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ "{{" }} vars.gitRepo {{ "}}" }}
            checkout:
              - branch: {{ .Values.targetRevision }}
                path: ./src
        {{- range $i, $update := .Values.kargo.stage.imageUpdates }}
        - uses: yaml-update
          as: update-image-{{ $i }}
          config:
            path: ./src/{{ $update.file }}
            updates:
              - key: {{ $update.key }}
                value: ${{ "{{" }} imageFrom({{ $update.image | quote }}).Tag {{ "}}" }}
        {{- end }}
        {{- if .Values.kargo.warehouse.chart.repoURL }}
        - uses: yaml-update
          as: update-chart
          config:
            path: ./src/configs/{{ .Values.name }}.yaml
            updates:
              - key: chart.version
                value: ${{ "{{" }} chartFrom({{ .Values.kargo.warehouse.chart.repoURL | quote }}, {{ .Values.kargo.warehouse.chart.name | default .Values.chart.name | quote }}).Version {{ "}}" }}
        {{- end }}
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              {{- range $i, $update := .Values.kargo.stage.imageUpdates }}
              ${{ "{{" }} outputs['update-image-{{ $i }}'].commitMessage {{ "}}" }}
              {{- end }}
              {{- if .Values.kargo.warehouse.chart.repoURL }}
              ${{ "{{" }} outputs['update-chart'].commitMessage {{ "}}" }}
              {{- end }}
        - uses: git-push
          config:
            path: ./src
        - uses: http
          config:
            method: PATCH
            url: https://kubernetes.default.svc/apis/argoproj.io/v1alpha1/namespaces/argocd/applicationsets/managed-apps
            headers:
              - name: Content-Type
                value: application/merge-patch+json
              - name: Authorization
                value: Bearer ${{ "{{" }} sharedSecret("kargo-k8s-api-token").token {{ "}}" }}
            insecureSkipTLSVerify: true
            body: '{"metadata":{"annotations":{"argocd.argoproj.io/application-set-refresh":"true"}}}'
            successExpression: response.status == 200
        - uses: argocd-update
          config:
            apps:
              - name: {{ .Values.name }}
                namespace: argocd
                sources:
                  {{- if .Values.kargo.warehouse.chart.repoURL }}
                  - repoURL: {{ .Values.chart.repoURL }}
                    chart: {{ .Values.chart.name }}
                    desiredRevision: ${{ "{{" }} chartFrom({{ .Values.kargo.warehouse.chart.repoURL | quote }}, {{ .Values.kargo.warehouse.chart.name | default .Values.chart.name | quote }}).Version {{ "}}" }}
                  {{- end }}
                  - repoURL: ${{ "{{" }} vars.gitRepo {{ "}}" }}
                    desiredRevision: ${{ "{{" }} outputs.commit.commit {{ "}}" }}
{{- end }}

