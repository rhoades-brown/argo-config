{{- if .Values.kargo.enabled }}
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: {{ include "app-loader.kargoProject" . }}
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: {{ .Values.name }}
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: {{ .Values.gitRepo }}
        - name: tagName
          value: ${{ "{{" }} ctx.project + "-" + ctx.promotion {{ "}}" }}
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ "{{" }} vars.gitRepo {{ "}}" }}
            checkout:
              - branch: main
                path: ./src
        {{- range $i, $update := .Values.kargo.stage.imageUpdates }}
        - uses: yaml-update
          as: update-image-{{ $i }}
          config:
            path: ./src/{{ $update.file }}
            updates:
              - key: {{ $update.key }}
                {{- if $update.useFullImage }}
                value: ${{ "{{" }} imageFrom({{ $update.image | quote }}).Name + ":" + imageFrom({{ $update.image | quote }}).Tag {{ "}}" }}
                {{- else }}
                value: ${{ "{{" }} imageFrom({{ $update.image | quote }}).Tag {{ "}}" }}
                {{- end }}
        {{- end }}
        {{- if .Values.kargo.warehouse.chart.repoURL }}
        - uses: yaml-update
          as: update-chart
          config:
            path: ./src/configs/{{ .Values.name }}.yaml
            updates:
              - key: chart.version
                {{- if .Values.kargo.warehouse.chart.name }}
                value: ${{ "{{" }} chartFrom({{ .Values.kargo.warehouse.chart.repoURL | quote }}, {{ .Values.kargo.warehouse.chart.name | quote }}).Version {{ "}}" }}
                {{- else }}
                value: ${{ "{{" }} chartFrom({{ .Values.kargo.warehouse.chart.repoURL | quote }}).Version {{ "}}" }}
                {{- end }}
        {{- end }}
        {{- if .Values.kargo.warehouse.gitSource.repoURL }}
        - uses: yaml-update
          as: update-git-source
          config:
            path: ./src/configs/{{ .Values.name }}.yaml
            updates:
              - key: gitSource.targetRevision
                value: ${{ "{{" }} commitFrom({{ .Values.kargo.warehouse.gitSource.repoURL | quote }}).Tag {{ "}}" }}
        {{- end }}
        - uses: yaml-update
          as: update-target-revision
          config:
            path: ./src/configs/{{ .Values.name }}.yaml
            updates:
              - key: targetRevision
                value: ${{ "{{" }} vars.tagName {{ "}}" }}
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              {{- range $i, $update := .Values.kargo.stage.imageUpdates }}
              ${{ "{{" }} outputs['update-image-{{ $i }}'].commitMessage {{ "}}" }}
              {{- end }}
              {{- if .Values.kargo.warehouse.chart.repoURL }}
              ${{ "{{" }} outputs['update-chart'].commitMessage {{ "}}" }}
              {{- end }}
              {{- if .Values.kargo.warehouse.gitSource.repoURL }}
              ${{ "{{" }} outputs['update-git-source'].commitMessage {{ "}}" }}
              {{- end }}
        - uses: git-push
          config:
            path: ./src
        - uses: http
          as: create-tag
          config:
            method: POST
            url: https://api.github.com/repos/rhoades-brown/argo-config/git/refs
            headers:
              - name: Accept
                value: application/vnd.github+json
              - name: Authorization
                value: Bearer ${{ "{{" }} sharedSecret("kargo-github-api-token").token {{ "}}" }}
            body: |
              ${{ "{{" }} quote({
                "ref": "refs/tags/" + vars.tagName,
                "sha": outputs.commit.commit
              }) {{ "}}" }}
            successExpression: response.status == 201
        - uses: http
          config:
            method: PATCH
            url: https://kubernetes.default.svc/apis/argoproj.io/v1alpha1/namespaces/argocd/applicationsets/managed-apps
            headers:
              - name: Content-Type
                value: application/merge-patch+json
              - name: Authorization
                value: Bearer ${{ "{{" }} sharedSecret("kargo-k8s-api-token").token {{ "}}" }}
            insecureSkipTLSVerify: true
            body: '{"metadata":{"annotations":{"argocd.argoproj.io/application-set-refresh":"true"}}}'
            successExpression: response.status == 200
