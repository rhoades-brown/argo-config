config:
  publicUri: "https://penpot.tailc14988.ts.net"
  flags: "enable-registration enable-login-with-password disable-email-verification disable-secure-session-cookies"
  telemetryEnabled: false

  postgresql:
    host: "penpot-cluster-rw"
    port: 5432
    username: "penpot"
    database: "penpot"
    existingSecret: "penpot-cluster-app"
    secretKeys:
      passwordKey: "password"

  redis:
    host: ""
    port: 6379
    database: "0"

  objectsStorage:
    storageBackend: "fs"
    filesystem:
      directory: "/opt/data/assets"

ingress:
  enabled: true
  className: tailscale
  hosts:
    - penpot
  tls:
    - hosts:
        - penpot

persistence:
  assets:
    enabled: true
    size: 10Gi
    storageClass: ""
