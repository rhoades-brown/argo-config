global:
    redisEnabled: true

config:
  publicUri: "https://penpot.tailc14988.ts.net"
  flags: "enable-registration enable-login-with-password disable-email-verification disable-secure-session-cookies"
  telemetryEnabled: false

  postgresql:
    host: "penpot-cluster-rw"
    port: 5432
    username: "penpot"
    database: "penpot"
    existingSecret: "penpot-cluster-app"
    secretKeys:
      passwordKey: "password"

  objectsStorage:
    storageBackend: "fs"
    filesystem:
      directory: "/opt/data/assets"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - penpot.services.rhoades-brown.local
  tls:
    - hosts:
        - penpot.services.rhoades-brown.local

persistence:
  assets:
    enabled: true
    size: 10Gi
    storageClass: ""
