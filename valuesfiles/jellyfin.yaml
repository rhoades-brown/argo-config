image:
  tag: 10.11.11
deploymentStrategy:
  type: Recreate

podSecurityContext:
  runAsUser: 3003
  runAsGroup: 3000
  fsGroup: 3000
  fsGroupChangePolicy: OnRootMismatch
volumes:
  - name: music
    persistentVolumeClaim:
      claimName: nfs-music
  - name: videos
    persistentVolumeClaim:
      claimName: nfs-videos
  - name: pn
    nfs:
      server: truenas.rhoades-brown.local
      path: /mnt/RustyPool/pn
  - name: yum
    nfs:
      server: truenas.rhoades-brown.local
      path: /mnt/RustyPool/Yum

volumeMounts:
  - name: music
    mountPath: "/media/music"
  - name: videos
    mountPath: "/media/videos"
  - name: pn
    mountPath: "/media/pn"
  - name: yum
    mountPath: "/media/yum"
ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: jellyfin.services.rhoades-brown.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  metrics:
    enabled: true

livenessProbe:
  timeoutSeconds: 10
  failureThreshold: 6

readinessProbe:
  timeoutSeconds: 10
  failureThreshold: 6

