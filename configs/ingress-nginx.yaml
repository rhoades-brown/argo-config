name: ingress-nginx
namespace: ingress-nginx

gitRepo: https://github.com/rhoades-brown/argo-config.git
targetRevision: main

chart:
  repoURL: https://kubernetes.github.io/ingress-nginx
  name: ingress-nginx
  version: 4.15.1

valuesFile: valuesfiles/ingress-nginx.yaml
manifestsPath: manifests/ingress-nginx

kargo:
  enabled: true
  project: kargo-ingress-nginx
  autoPromotionEnabled: true
  warehouse:
    images: []
    chart:
      repoURL: https://kubernetes.github.io/ingress-nginx
      name: ingress-nginx
      semverConstraint: ">=4.14.0"
  stage:
    imageUpdates: []

