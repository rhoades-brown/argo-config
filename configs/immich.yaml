name: immich
namespace: immich

gitRepo: https://github.com/rhoades-brown/argo-config.git
targetRevision: kargo-immich-prod.01kp3pdhcekd3gx0n7xv9d3138.d78f340

chart:
  repoURL: https://immich-app.github.io/immich-charts
  name: immich
  version: 0.11.1

valuesFile: valuesfiles/immich.yaml
manifestsPath: manifests/immich

kargo:
  enabled: true
  project: kargo-immich
  autoPromotionEnabled: true
  warehouse:
    images:
      - repoURL: ghcr.io/immich-app/immich-server
        tagSelectionStrategy: SemVer
        allowTags: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    chart:
      repoURL: https://immich-app.github.io/immich-charts
      name: immich
      semverConstraint: ">=0.10.0"
  stage:
    imageUpdates:
      - key: image.tag
        image: ghcr.io/immich-app/immich-server
        file: valuesfiles/immich.yaml
      - key: controllers.main.containers.main.image.tag
        image: ghcr.io/immich-app/immich-server
        file: valuesfiles/immich.yaml

