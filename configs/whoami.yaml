name: whoami
namespace: whoami

gitRepo: https://github.com/rhoades-brown/argo-config.git
targetRevision: main

helmPath: helm/whoami

valuesObject:
  image:
    tag: v1.5.0
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - host: whoami.services.rhoades-brown.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - hosts:
        - whoami.services.rhoades-brown.local

kargo:
  enabled: true
  project: kargo-whoami
  autoPromotionEnabled: true
  warehouse:
    images:
      - repoURL: docker.io/traefik/whoami
        tagSelectionStrategy: SemVer
        allowTags: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    chart:
      repoURL: ""
      semverConstraint: ""
  stage:
    imageUpdates:
      - key: valuesObject.image.tag
        image: docker.io/traefik/whoami
        file: configs/whoami.yaml

